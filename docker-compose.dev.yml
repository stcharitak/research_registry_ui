services:
  ui:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: research_registry_ui_dev
    working_dir: /app
    command: sh -c "npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    networks:
      - research_registry_net
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - dist/
            - .git/
        - action: rebuild
          path: package.json
        - action: rebuild
          path: package-lock.json

networks:
  research_registry_net:
    external: true
